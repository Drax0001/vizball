# Nginx site config for Vizball Play Pro.
# Copy to /etc/nginx/sites-available/vizball, symlink into sites-enabled,
# and replace every YOUR_DOMAIN / path placeholder below.
#
# This config is written for the pre-HTTPS state. Run certbot afterwards
# (see DEPLOYMENT.md step 7) — it will rewrite this file to add the
# certificate paths and the port-80-to-443 redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # Built frontend (output of `npm run build` — the dist/ folder)
    root /var/www/vizball/dist;
    index index.html;

    client_max_body_size 12M; # a bit above the backend's 10MB upload limit

    # API and uploads are reverse-proxied to the Bun backend, which is only
    # listening on loopback (127.0.0.1:5000) — never exposed directly.
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # React Router — any path not matched above falls back to index.html so
    # client-side routing (e.g. a direct visit to /tutoriels) works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the hashed Vite build assets; index.html itself is never
    # cached so a new deploy is picked up immediately.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
